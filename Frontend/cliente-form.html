<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente - Softline</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="content-box">
            <h1 id="formTitle">Cadastro de Cliente</h1>
            <button class="btn-back" onclick="window.location.href='clientes.html'">Voltar</button>
            
            <form id="clienteForm">
                <div class="form-group">
                    <label>Nome (máx 60 caracteres) *</label>
                    <input type="text" id="nome" maxlength="60" required>
                </div>
                <div class="form-group">
                    <label>Nome Fantasia (máx 100 caracteres)</label>
                    <input type="text" id="fantasia" maxlength="100">
                </div>
                <div class="form-group">
                    <label>Documento (CPF ou CNPJ) *</label>
                    <input type="text" id="documento" required>
                </div>
                <div class="form-group">
                    <label>Endereço</label>
                    <textarea id="endereco" rows="3"></textarea>
                </div>
                <button type="submit">Salvar</button>
                <div id="message"></div>
            </form>
        </div>
    </div>
    <script src="js/cliente-form.js"></script>
</body>
</html>
